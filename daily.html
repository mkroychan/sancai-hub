<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 每日雷達 · 三才</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16130F;          /* 夜墨底 */
  --panel:#211D17;        /* 卡面 */
  --panel2:#2A251D;
  --line:#3A332A;
  --paper:#EDE6D8;        /* 主文字 */
  --dim:#9E9484;          /* 次文字 */
  --fire:#E4762F;         /* 離火 */
  --gold:#D9A441;
  --jade:#57B283;         /* 漲 / 安全 */
  --cinnabar:#D6544A;     /* 跌 / 緊迫 */
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:'Noto Sans TC',system-ui,sans-serif;
  font-size:17px;line-height:1.55;
  max-width:520px;margin:0 auto;
  padding:20px 16px 110px;
}
/* ── 頭部:離卦活指示 ── */
header{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.trigram{display:flex;flex-direction:column;gap:4px;width:34px;flex:none}
.trigram i{height:5px;border-radius:2px;background:var(--fire);opacity:.35;transition:opacity .6s, box-shadow .6s}
.trigram i.mid{background:linear-gradient(90deg,var(--fire) 38%,transparent 38%,transparent 62%,var(--fire) 62%)}
.trigram.lit i{opacity:1;box-shadow:0 0 8px rgba(228,118,47,.55)}
h1{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;letter-spacing:.04em}
.meta{color:var(--dim);font-size:13.5px;margin-bottom:18px}
.meta b{color:var(--gold);font-weight:500}

/* ── 通用區塊 ── */
section{margin-bottom:22px}
.sec-t{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--gold);letter-spacing:.18em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-t::after{content:"";flex:1;height:1px;background:var(--line)}

/* ── 倒數 ── */
.chips{display:flex;flex-direction:column;gap:8px}
.chip{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
.dnum{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;min-width:66px;text-align:center;flex:none}
.chip small{display:block;color:var(--dim);font-size:12.5px;margin-top:1px}
.u-hot .dnum{color:var(--cinnabar)}
.u-warm .dnum{color:var(--gold)}
.u-cool .dnum{color:var(--jade)}
.u-past{opacity:.55}.u-past .dnum{color:var(--dim);font-size:15px}

/* ── 幣價 ── */
.coins{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.coin{display:flex;align-items:baseline;padding:12px 14px;border-bottom:1px solid var(--line)}
.coin:last-child{border-bottom:none}
.coin .sym{font-weight:700;width:86px;flex:none}
.coin .sym small{display:block;font-weight:400;color:var(--dim);font-size:11.5px}
.coin .px{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:500}
.coin .chg{width:86px;text-align:right;font-variant-numeric:tabular-nums;font-size:14px;flex:none}
.up{color:var(--jade)}.down{color:var(--cinnabar)}
.coins .note{padding:11px 14px;color:var(--dim);font-size:13.5px}

/* ── 今日必辦 ── */
.todo{display:flex;flex-direction:column;gap:8px}
.todo-item{display:flex;align-items:flex-start;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;cursor:pointer;user-select:none}
.box{width:26px;height:26px;border:2px solid var(--gold);border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink);margin-top:1px}
.done .box{background:var(--jade);border-color:var(--jade)}
.done .txt{color:var(--dim);text-decoration:line-through}
.todo-item .tag{color:var(--cinnabar);font-size:12.5px;font-weight:700;margin-right:6px}
.empty{background:var(--panel);border:1px dashed var(--line);border-radius:var(--r);padding:16px 14px;color:var(--dim);text-align:center;font-size:15px}

/* ── 刷新情報 ── */
.dock{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--ink) 30%);padding:18px 16px 22px;display:flex;justify-content:center}
#refresh{
  width:100%;max-width:488px;height:58px;border:none;border-radius:29px;
  background:linear-gradient(135deg,var(--fire),#C2591E);
  color:#FFF7EC;font-size:19px;font-weight:700;font-family:'Noto Sans TC',sans-serif;
  letter-spacing:.12em;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;
  box-shadow:0 4px 18px rgba(228,118,47,.35);
}
#refresh:active{transform:scale(.98)}
.sweep{width:20px;height:20px;border:2px solid rgba(255,247,236,.5);border-top-color:#FFF7EC;border-radius:50%;flex:none}
.spinning .sweep{animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.hublink{text-align:center;margin-top:26px}
.hublink a{color:var(--dim);font-size:14px;text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:2px}
@media (prefers-reduced-motion: reduce){.spinning .sweep{animation:none}}
</style>
</head>
<body>

<header>
  <div class="trigram" id="trigram"><i></i><i class="mid"></i><i></i></div>
  <h1>每日雷達</h1>
</header>
<div class="meta" id="meta">—</div>

<section>
  <div class="sec-t">倒 數</div>
  <div class="chips" id="chips"></div>
</section>

<section>
  <div class="sec-t">感 應 器 幣 價</div>
  <div class="coins" id="coins"><div class="note">讀取中…</div></div>
</section>

<section>
  <div class="sec-t">今 日 必 辦</div>
  <div class="todo" id="todo"></div>
</section>

<div class="hublink"><a href="index.html">🎛️ 回三才控制中心</a></div>

<div class="dock">
  <button id="refresh"><span class="sweep"></span>刷新情報</button>
</div>

<script>
/* ============ 設定(C 維護,狀態變化時出新版) ============ */
const TZ='Australia/Melbourne';
const MILESTONES=[
  {d:'2026-07-24', t:'DFFH 無回覆即致電 1300 650 172', s:'住房 · 腳本在日曆'},
  {d:'2026-07-28', t:'Whitehorse 罰單申訴跟進', s:'查郵件有無結果'},
  {d:'2026-08-31', t:'找房閘門 A', s:'lease break 決策 · 說「閘門覆盤」'},
  {d:'2026-09-22', t:'硬死線:發 Notice of Intention to Vacate', s:'無論簽到與否都要發'},
  {d:'2026-10-01', t:'找房閘門 B', s:'未簽到即降級 · 說「閘門覆盤」'},
  {d:'2026-10-20', t:'現租約到期', s:'Wheelers Hill'}
];
const COINS=[
  {id:'fetch-ai',sym:'FET',n:'AI 聯盟'},
  {id:'bittensor',sym:'TAO',n:'去中心算力'},
  {id:'akash-network',sym:'AKT',n:'雲算力市場'},
  {id:'immutable-x',sym:'IMX',n:'鏈遊'},
  {id:'render-token',sym:'RENDER',n:'GPU 渲染'}
];

/* ============ 日期(墨爾本) ============ */
function melToday(){
  const p=new Intl.DateTimeFormat('en-CA',{timeZone:TZ}).format(new Date()); // YYYY-MM-DD
  return p;
}
function daysTo(dstr){
  const a=new Date(melToday()+'T00:00:00Z'), b=new Date(dstr+'T00:00:00Z');
  return Math.round((b-a)/86400000);
}
function store(k,v){try{if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v);}catch(e){return null}}

/* ============ 頭部 ============ */
const wd=['日','一','二','三','四','五','六'];
(function(){
  const now=new Date();
  const d=new Intl.DateTimeFormat('zh-TW',{timeZone:TZ,month:'long',day:'numeric'}).format(now);
  const w=wd[Number(new Intl.DateTimeFormat('en-US',{timeZone:TZ,weekday:'narrow',hour12:false}).formatToParts?new Date(new Date().toLocaleString('en-US',{timeZone:TZ})).getDay():now.getDay())];
  document.getElementById('meta').innerHTML=`${d} · 週${w} &nbsp;|&nbsp; 更新 <b id="upt">—</b>`;
})();
function stamp(){
  const t=new Intl.DateTimeFormat('zh-TW',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date());
  document.getElementById('upt').textContent=t;
}

/* ============ 倒數 ============ */
(function(){
  const el=document.getElementById('chips');
  MILESTONES.forEach(m=>{
    const n=daysTo(m.d);
    if(n<-7)return;                       // 過期一週後自動退場
    const cls=n<0?'u-past':n<=3?'u-hot':n<=14?'u-warm':'u-cool';
    const num=n<0?'已過':n===0?'今天':'D-'+n;
    el.insertAdjacentHTML('beforeend',
      `<div class="chip ${cls}"><div class="dnum">${num}</div><div>${m.t}<small>${m.d.slice(5).replace('-','/')} · ${m.s}</small></div></div>`);
  });
})();

/* ============ 今日必辦(自動浮現 D≤3 與逾期項) ============ */
(function(){
  const el=document.getElementById('todo');
  const key='sancai_done_'+melToday();
  const done=new Set((store(key)||'').split(',').filter(Boolean));
  let count=0;
  MILESTONES.forEach((m,i)=>{
    const n=daysTo(m.d);
    if(n>3||n<-7)return;
    count++;
    const id='m'+i, isDone=done.has(id);
    const tag=n<0?'<span class="tag">逾期</span>':n===0?'<span class="tag">今天</span>':'';
    const item=document.createElement('div');
    item.className='todo-item'+(isDone?' done':'');
    item.innerHTML=`<div class="box">${isDone?'✓':''}</div><div class="txt">${tag}${m.t}<small style="display:block;color:var(--dim);font-size:12.5px">${m.s}</small></div>`;
    item.onclick=()=>{
      item.classList.toggle('done');
      const on=item.classList.contains('done');
      item.querySelector('.box').textContent=on?'✓':'';
      on?done.add(id):done.delete(id);
      store(key,[...done].join(','));
    };
    el.appendChild(item);
  });
  if(!count)el.innerHTML='<div class="empty">今日無到期事項 — 系統安靜待命 ☲</div>';
})();

/* ============ 幣價 ============ */
async function loadCoins(){
  const el=document.getElementById('coins');
  try{
    const ids=COINS.map(c=>c.id).join(',');
    const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=aud&include_24hr_change=true`);
    if(!r.ok)throw 0;
    const d=await r.json();
    el.innerHTML=COINS.map(c=>{
      const p=d[c.id];if(!p)return '';
      const chg=p.aud_24h_change||0, up=chg>=0;
      const px=p.aud>=100?p.aud.toLocaleString('en-AU',{maximumFractionDigits:0}):p.aud.toFixed(p.aud>=1?2:4);
      return `<div class="coin"><div class="sym">${c.sym}<small>${c.n}</small></div>
        <div class="px">A$${px}</div>
        <div class="chg ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(chg).toFixed(1)}%</div></div>`;
    }).join('');
    document.getElementById('trigram').classList.add('lit');
    stamp();
  }catch(e){
    el.innerHTML='<div class="note">📴 暫時取不到幣價 — 按「刷新情報」重試</div>';
    stamp();
  }
}

/* ============ 刷新情報 ============ */
const btn=document.getElementById('refresh');
btn.onclick=async()=>{
  btn.classList.add('spinning');
  document.getElementById('trigram').classList.remove('lit');
  await loadCoins();
  setTimeout(()=>btn.classList.remove('spinning'),500);
};

loadCoins();
</script>
</body>
</html>
